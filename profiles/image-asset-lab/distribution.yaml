name: image-asset-lab
version: 1.0.0
description: "Image ASSET generation (the hands): runs the image model from image-prompter's"
hermes_requires: ">=0.16.0"
author: "Genius365 Design Team"
license: "UNLICENSED"
distribution_owned:
  - SOUL.md
  - references/DESIGN-OS.md
  - skills/image-asset-generation
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access (provider=openrouter)"
    required: true
  - name: CLOUDFLARE_ACCOUNT_ID
    description: "Cloudflare account id for the free image-generation lane"
    required: false
    default: ""
  - name: CLOUDFLARE_API_TOKEN
    description: "Cloudflare Workers AI token for image generation"
    required: false
    default: ""
